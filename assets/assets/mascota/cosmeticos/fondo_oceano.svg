  <line x1="48" y1="334" x2="44" y2="360" stroke="#f48fb1" stroke-width="1.5" opacity="0.6" stroke-linecap="round"/>
  <line x1="56" y1="334" x2="54" y2="362" stroke="#f48fb1" stroke-width="1.5" opacity="0.6" stroke-linecap="round"/>
  <line x1="64" y1="334" x2="66" y2="362" stroke="#f48fb1" stroke-width="1.5" opacity="0.6" stroke-linecap="round"/>
  <line x1="72" y1="334" x2="76" y2="360" stroke="#f48fb1" stroke-width="1.5" opacity="0.6" stroke-linecap="round"/>
